eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

management:
    endpoints:
        web:
            exposure:
                include: "*" 
    endpoint:
        health:
            show-details: always

spring:
    datasource:
        driver-class-name: org.postgresql.Driver
        username: ${DB_USER:postgres}
        password: ${DB_PASS:password}
    flyway:
        enabled: true
        baseline-on-migrate: true
        baseline-version: 1.0
        create-schemas: true
    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                format_sql: true #Ver las consultas en consola
                show_sql: true #ver la query

custom:
    database:
        host: localhost
        port: 5432
        name: proyecto_db



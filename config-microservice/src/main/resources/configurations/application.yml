eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

management:
    endpoints:
        web:
            exposure:
                include: "*" 
    endpoint:
        health:
            show-details: always

spring:
    datasource:
        driver-class-name: org.postgresql.Driver
        username: ${DB_USER:postgres}
        password: ${DB_PASS:password}
        hikari:
            maximum-pool-size: 2
            minimum-idle: 0
            idle-timeout: 10000
            connection-timeout: 30000
    flyway:
        enabled: true
        baseline-on-migrate: true
        baseline-version: 1.0
        create-schemas: true
        connect-retries: 5
    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                format_sql: true #Ver las consultas en consola
                show_sql: true #ver la query

custom:
    database:
        host: aws-1-us-west-2.pooler.supabase.com
        port: 5432
        name: postgres

springdoc:
    swagger-ui:
        path: /swagger-ui.html
    api-docs:
        path: /v3/api-docs


